# ============================================================
# Related Work Agent — 主配置文件
# 切换模型只需修改此处，代码无需改动
# ============================================================

# ── LLM 配置（生成 Related Work 用）──────────────────────────
llm:
  # 可选 provider: anthropic | openai | azure_openai | deepseek | dashscope | ollama
  provider: "dashscope"
  # 对应 provider 的模型名称，示例：
  #   anthropic   → claude-opus-4-5 / claude-sonnet-4-5
  #   openai      → gpt-4o / gpt-4-turbo
  #   deepseek    → deepseek-chat / deepseek-reasoner
  #   dashscope   → qwen-max / qwen-plus / qwen-turbo
  #   ollama      → llama3 / mistral / qwen2
  model: "qwen3-max-2026-01-23"
  max_tokens: 4096
  temperature: 0.3
  # Azure OpenAI 专用（provider=azure_openai 时生效）
  azure_endpoint: ""
  azure_api_version: "2024-02-01"
  azure_deployment: ""
  # Ollama 专用（本地运行，无需 API Key）
  ollama_base_url: "http://localhost:11434"

# ── 评分 LLM（可与生成 LLM 不同，建议用更快/便宜的模型）────
scorer_llm:
  provider: "dashscope"
  model: "qwen3-max-2026-01-23"
  max_tokens: 1024
  temperature: 0.0
  azure_endpoint: ""
  azure_api_version: "2024-02-01"
  azure_deployment: ""
  ollama_base_url: "http://localhost:11434"

# ── 数据路径（相对项目根目录）────────────────────────────────
data:
  background_papers_dir: "data/background_papers"
  comparison_papers_dir: "data/comparison_papers"
  venue_style_papers_dir: "data/venue_style_papers"
  my_paper_dir: "data/my_paper"

# ── Embedding & 检索模型 ─────────────────────────────────────
retrieval:
  embedding_model: "allenai/specter2_base"
  # ColBERT 配置（可选，设 use_colbert: true 启用）
  use_colbert: false
  colbert_model: "colbert-ir/colbertv2.0"
  # Cross-Encoder 精排（默认启用，速度快）
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  dense_top_k: 100
  colbert_top_k: 30
  reranker_top_k: 15

# ── 分块参数 ─────────────────────────────────────────────────
chunking:
  default_chunk_size: 400
  default_overlap: 50
  method_chunk_size: 500
  method_overlap: 80

# ── 生成参数 ─────────────────────────────────────────────────
generation:
  max_iterations: 3
  target_venue: "IEEE TMC"
  language: "english"
  latex_bib_style: "IEEEtran"
  # 是否使用 LLM 自动精修 BibTeX 条目（补全作者、期刊、DOI 等信息）
  refine_bib: true

# ── 并行参数 ─────────────────────────────────────────────────
parallel:
  max_pdf_workers: 8
  embedding_batch_size: 64

# ── 输出 ─────────────────────────────────────────────────────
output:
  dir: "outputs"
  save_all_iterations: true

# ============================================================
# Review Advisor 配置（新增）
# ============================================================
review_advisor:
  # 输入
  input_dir: "data/review_input"

  # 批注提取
  annotation:
    # 支持的 PDF 批注类型（pymupdf annotation type names）
    supported_types:
      - "Text"           # Sticky note（最常见，审稿人的评语气泡）
      - "Highlight"      # 高亮（通常配合 Text 使用）
      - "Underline"      # 下划线
      - "StrikeOut"      # 删除线（审稿人建议删除的内容）
      - "FreeText"       # 内嵌文本批注
      - "Squiggly"       # 波浪线（通常标记有问题的表达）
    # 高亮批注若无配套 Text 评语，是否仍提取（仅凭上下文推断意图）
    extract_highlight_without_comment: true
    # 上下文窗口：提取批注时，前后各取多少个句子作为上下文
    context_sentences_before: 3
    context_sentences_after: 3

  # 意图分类
  intent_classification:
    # 并行分类的批注数量（每批）
    batch_size: 10

  # 检索（复用现有 retrieval 配置，此处可覆盖）
  retrieval:
    dense_top_k: 50         # 针对每条批注的检索数量（比生成任务少，精度优先）
    colbert_top_k: 15
    cross_encoder_top_k: 5  # 最终只取 top-5 支撑证据，避免 prompt 过长

  # 生成
  generation:
    # 是否生成 before/after 对比版本的修改建议
    generate_diff: true
    # 是否同时生成中文版报告
    generate_chinese_report: false
    # 每条建议的最大 token 数
    max_tokens_per_suggestion: 800

  # 输出
  output:
    dir: "outputs"
    # 是否为每条批注单独生成 per_comment/ 文件
    save_per_comment: true
